<!DOCTYPE html>
<html lang="hi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>इवेंट्स | न्यू प्रतिभा डिजिटल स्टूडियो</title>

  <link rel="stylesheet" href="../../css/style.css">
</head>

<body>

<div class="events-top">
  <section class="event-hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <span class="hero-tag">लग्ज़री इवेंट शूट</span>
      <h1>
        हर आयोजन
        <span>एक यादगार कहानी की हकदार है</span>
      </h1>
      <p>
        भावनाओं, परंपराओं और अनमोल यादों को सिनेमाई खूबसूरती के साथ संजोते हैं।
      </p>
      <a href="#gallery" class="hero-btn">गैलरी देखें</a>
    </div>
    <div class="scroll-indicator">स्क्रॉल करें</div>
  </section>

  <section class="gallery-categories" id="gallery">
    <h2 class="section-title">इवेंट गैलरी</h2>
    <div class="category-grid">
      <button class="category-btn" data-filter="Birthday Shoot">जन्मदिन शूट</button>
      <button class="category-btn" data-filter="College & School Shoot">कॉलेज और स्कूल शूट</button>
      <button class="category-btn" data-filter="Maternity Shoot">मैटरनिटी शूट</button>
    </div>
  </section>
</div>


<section class="Events-gallery">
  <div class="gallery-grid"></div>
</section>

<div id="gallery-lightbox" class="gallery-lightbox"></div>

<script src="../../js/eventsData.js"></script>
<script src="../../js/gallery.js"></script>
<script src="../../js/main.js"></script>

</body>
</html>
