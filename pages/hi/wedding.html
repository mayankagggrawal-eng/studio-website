<!DOCTYPE html>
<html lang="hi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>विवाह फोटोग्राफी | न्यू प्रतिभा डिजिटल स्टूडियो</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>

<body>

<!-- =========================
     Wedding Hero
========================== -->

<div class="wedding-top">
  <section class="wedding-hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <span class="hero-tag">प्रीमियम विवाह फोटोग्राफी</span>
      <h1>
        हर शादी
        <span>एक यादगार कहानी की हकदार है</span>
      </h1>
      <p>
        भावनाओं, परंपराओं और अनमोल यादों को सिनेमाई अंदाज़ में हमेशा के लिए संजोते हैं।
      </p>
      <a href="#gallery" class="hero-btn">गैलरी देखें</a>
    </div>
  </section>

<!-- ==========================
     Wedding Categories
========================== -->

<section class="gallery-categories" id="gallery">
  <h2 class="section-title">विवाह श्रेणियाँ</h2>
  <div class="category-grid">
    <button class="category-btn" data-filter="Bride Shoot">दुल्हन</button>
    <button class="category-btn" data-filter="Wedding Shoot">विवाह समारोह</button>
    <button class="category-btn" data-filter="Reception Shoot">रिसेप्शन</button>
  </div>
  <div class="scroll-indicator">स्क्रॉल करें</div>
</section>
</div>

<!-- Wedding Gallery -->

<section class="wedding-gallery">

    <div class="gallery-grid">

    </div>

</section>

<div id="gallery-lightbox" class="gallery-lightbox"></div>

<script src="../../js/weddingData.js"></script>
<script src="../../js/gallery.js"></script>
<script src="../../js/main.js"></script>



</body>

</html>
