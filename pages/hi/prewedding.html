<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>प्री-वेडिंग फोटोग्राफी | न्यू प्रतिभा डिजिटल स्टूडियो</title>

    <link rel="stylesheet" href="../../css/style.css">
</head>

<body>

<!-- =========================
     HERO SECTION
========================== -->

<div class="pre-wedding-top">

<section class="pre-wedding-hero">

    <div class="hero-overlay"></div>
    <div class="hero-content">

        <span class="hero-tag">
            प्रीमियम प्री-वेडिंग फोटोग्राफी
        </span>

        <h1>
            हर शादी
            <span>एक यादगार कहानी की हकदार है</span>
        </h1>

        <p>
            भावनाओं, परंपराओं और अनमोल यादों को सिनेमाई अंदाज़ में हमेशा के लिए संजोते हैं।
        </p>

        <a href="#gallery" class="hero-btn">
            गैलरी देखें
        </a>

    </div>

    <!-- Scroll indicator MUST be inside hero -->
    <div class="scroll-indicator">
        स्क्रॉल करें
    </div>

</section>

<!-- =========================
     CATEGORIES SECTION
========================== -->

<section class="gallery-categories" id="gallery">

    <h2 class="section-title">
        प्री-वेडिंग श्रेणियाँ
    </h2>

    <div class="category-grid">

<button class="category-btn" data-filter="mehendi Shoot">
    मेहंदी
</button>

<button class="category-btn" data-filter="haldi Shoot">
    हल्दी
</button>

<button class="category-btn" data-filter="Engagement Shoot">
    सगाई
</button>

<button class="category-btn" data-filter="candid-portrait Shoot">
    कैंडिड एवं पोर्ट्रेट
</button>

    </div>

</section>

</div>

<!-- =========================
     GALLERY SECTION
========================== -->

<section class="Pre-Wedding-gallery">

    <div class="gallery-grid">
        <!-- JS inject images here -->
    </div>

</section>

<!-- LIGHTBOX -->
<div id="gallery-lightbox" class="gallery-lightbox"></div>

<script src="../../js/prewedding.js"></script>
<script src="../../js/gallery.js"></script>

</body>
</html>
