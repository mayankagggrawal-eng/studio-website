<!DOCTYPE html>
<html lang="mr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>लग्न फोटोग्राफी | न्यू प्रतिभा डिजिटल स्टुडिओ</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>

<body>

<!-- =========================
     लग्न हिरो सेक्शन
========================== -->

<div class="wedding-top">
  <section class="wedding-hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <span class="hero-tag">प्रीमियम लग्न फोटोग्राफी</span>
      <h1>
        प्रत्येक लग्न
        <span>एका अविस्मरणीय कथेचा भाग असतो</span>
      </h1>
      <p>
        भावना, परंपरा आणि अविस्मरणीय आठवणी सिनेमॅटिक शैलीत कायमस्वरूपी जतन करतो.
      </p>
      <a href="#gallery" class="hero-btn">गॅलरी पहा</a>
    </div>
  </section>

<!-- ==========================
     लग्न कॅटेगरीज
========================== -->

<section class="gallery-categories" id="gallery">
  <h2 class="section-title">लग्नाचे विभाग</h2>
  <div class="category-grid">
    <button class="category-btn" data-filter="Bride Shoot">वधू शूट</button>
    <button class="category-btn" data-filter="Wedding Shoot">लग्न समारंभ</button>
    <button class="category-btn" data-filter="Reception Shoot">स्वागत समारंभ</button>
  </div>
  <div class="scroll-indicator">स्क्रोल करा</div>
</section>
</div>

<!-- लग्न गॅलरी -->

<section class="wedding-gallery">
  <div class="gallery-grid"></div>
</section>

<div id="gallery-lightbox" class="gallery-lightbox"></div>

<script src="../../js/weddingData.js"></script>
<script src="../../js/gallery.js"></script>
<script src="../../js/main.js"></script>

</body>
</html>
