<!DOCTYPE html>
<html lang="mr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>इव्हेंट्स | न्यू प्रतिभा डिजिटल स्टुडिओ</title>
<link rel="canonical" href="https://studio-website-d42.pages.dev/mr/events.html">

  <link rel="stylesheet" href="../../css/style.css">
</head>

<body>

<div class="events-top">
  <section class="event-hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <span class="hero-tag">प्रीमियम इव्हेंट फोटोग्राफी</span>
      <h1>
        प्रत्येक इव्हेंट
        <span>एक अविस्मरणीय कथा असते</span>
      </h1>
      <p>
        भावना, परंपरा आणि खास क्षण सिनेमॅटिक शैलीत जपतो.
      </p>
      <a href="#gallery" class="hero-btn">गॅलरी पहा</a>
    </div>
    <div class="scroll-indicator">स्क्रोल करा</div>
  </section>

  <section class="gallery-categories" id="gallery">
    <h2 class="section-title">इव्हेंट गॅलरी</h2>
    <div class="category-grid">
      <button class="category-btn" data-filter="Birthday Shoot">जन्मदिन सोहळा</button>
      <button class="category-btn" data-filter="College & School Shoot">शाळा आणि कॉलेज इव्हेंट</button>
      <button class="category-btn" data-filter="Maternity Shoot">मातृत्व शूट</button>
    </div>
  </section>
</div>

<section class="Events-gallery">
  <div class="gallery-grid"></div>
</section>

<div id="gallery-lightbox" class="gallery-lightbox"></div>

<script src="../../js/eventsData.js"></script>
<script src="../../js/gallery.js"></script>
<script src="../../js/main.js"></script>

</body>
</html>
