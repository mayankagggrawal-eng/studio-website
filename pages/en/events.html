<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events | New Pratibha Digital Studio</title>

  <link rel="stylesheet" href="../../css/style.css">
</head>

<body>


<section class="event-hero">

    <img src="../../assets/services/Events/01.jpg" alt="Events Shoot">

    <div class="hero-overlay"></div>

    <div class="hero-content">

        <span class="hero-tag">Luxury Event Shoot</span>

        <h1>
            Every Event
            <span>Deserves a Timeless Story</span>
        </h1>

        <p>
            Capturing emotions, traditions, and unforgettable memories with cinematic elegance.
        </p>

        <a href="#gallery" class="hero-btn">Explore Gallery</a>

    </div>

    <div class="scroll-indicator">Scroll</div>

</section>




<section class="gallery-categories" id="gallery">

  <h2 class="section-title">Events Gallery</h2>

  <div class="category-grid">

<button class="category-btn" data-filter="Birthday Shoot">Birthday Shoot</button>

<button class="category-btn" data-filter="College & School Shoot">
College & School Shoot
</button>

<button class="category-btn" data-filter="Maternity Shoot">
Maternity Shoot
</button>
  </div>

</section>

<section class="Events-gallery">
  <div class="gallery-grid"></div>
</section>

<div id="gallery-lightbox" class="gallery-lightbox"></div>


<script src="../../js/eventsData.js"></script>
<script src="../../js/gallery.js"></script>


</body>
</html>
