<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pre-Wedding Shoot | New Pratibha Digital Studio</title>

    <link rel="stylesheet" href="../../css/style.css">
</head>

<body>

<!-- =========================
     HERO SECTION
========================== -->

<div class="pre-wedding-top">

<section class="pre-wedding-hero">

    <div class="hero-overlay"></div>
    <div class="hero-content">

        <span class="hero-tag">
            Luxury Pre-Wedding Shoot
        </span>

        <h1>
            Every Wedding
            <span>Deserves a Timeless Story</span>
        </h1>

        <p>
            Capturing emotions, traditions, and unforgettable memories with cinematic elegance.
        </p>

        <a href="#gallery" class="hero-btn">
            Explore Gallery
        </a>

    </div>

    <!-- Scroll indicator MUST be inside hero -->
    <div class="scroll-indicator">
        Scroll
    </div>

</section>






















<!-- =========================
     CATEGORIES SECTION
========================== -->

<section class="gallery-categories" id="gallery">

    <h2 class="section-title">
        Pre-Wedding Categories
    </h2>

    <div class="category-grid">



<button class="category-btn" data-filter="mehendi Shoot">
    Mehendi
</button>

<button class="category-btn" data-filter="haldi Shoot">
    Haldi
</button>

<button class="category-btn" data-filter="Engagement Shoot">
    Engagement
</button>

<button class="category-btn" data-filter="candid-portrait Shoot">
    Candid & Portrait
</button>






    </div>



</section>

</div>
<!-- =========================
     GALLERY SECTION
========================== -->

<section class="Pre-Wedding-gallery">

    <div class="gallery-grid">
        <!-- JS inject images here -->
    </div>

</section>


<!-- LIGHTBOX -->
<div id="gallery-lightbox" class="gallery-lightbox"></div>


<script src="../../js/prewedding.js"></script>
<script src="../../js/gallery.js"></script>
<script src="../../js/main.js"></script>






</body>
</html>
